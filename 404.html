<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting...</title>
  <script>
    (function() {
      var path = window.location.pathname || '/';
      var segments = path.split('/').filter(Boolean);
      var base = '';

      if (window.location.hostname.endsWith('github.io') && segments[0] && segments[0] !== 'site') {
        base = '/' + segments[0];
      }

      var siteRoot = base + '/site/www.uohkca.com/';
      if (path.startsWith(siteRoot)) {
        window.location.replace(siteRoot);
        return;
      }

      var route = base && path.startsWith(base + '/') ? path.slice(base.length) : path;
      var target = siteRoot.slice(0, -1) + route + window.location.search + window.location.hash;
      window.location.replace(target);
    })();
  </script>
</head>
<body></body>
</html>
